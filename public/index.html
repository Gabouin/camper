<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camper — Dashboard</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <div id="login-screen" class="hidden">
      <div class="login-card">
        <h1>⛺ Camper</h1>
        <p>Slack support dashboard</p>
        <a href="/auth/slack" class="btn btn-slack">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M5.042 15.165a2.528 2.528 0 0 1-2.52 2.523A2.528 2.528 0 0 1 0 15.165a2.527 2.527 0 0 1 2.522-2.52h2.52v2.52zm1.271 0a2.527 2.527 0 0 1 2.521-2.52 2.527 2.527 0 0 1 2.521 2.52v6.313A2.528 2.528 0 0 1 8.834 24a2.528 2.528 0 0 1-2.521-2.522v-6.313zM8.834 5.042a2.528 2.528 0 0 1-2.521-2.52A2.528 2.528 0 0 1 8.834 0a2.528 2.528 0 0 1 2.521 2.522v2.52H8.834zm0 1.271a2.528 2.528 0 0 1 2.521 2.521 2.528 2.528 0 0 1-2.521 2.521H2.522A2.528 2.528 0 0 1 0 8.834a2.528 2.528 0 0 1 2.522-2.521h6.312zm10.122 2.521a2.528 2.528 0 0 1 2.522-2.521A2.528 2.528 0 0 1 24 8.834a2.528 2.528 0 0 1-2.522 2.521h-2.522V8.834zm-1.268 0a2.528 2.528 0 0 1-2.523 2.521 2.527 2.527 0 0 1-2.52-2.521V2.522A2.527 2.527 0 0 1 15.165 0a2.528 2.528 0 0 1 2.523 2.522v6.312zm-2.523 10.122a2.528 2.528 0 0 1 2.523 2.522A2.528 2.528 0 0 1 15.165 24a2.527 2.527 0 0 1-2.52-2.522v-2.522h2.52zm0-1.268a2.527 2.527 0 0 1-2.52-2.523 2.526 2.526 0 0 1 2.52-2.52h6.313A2.527 2.527 0 0 1 24 15.165a2.528 2.528 0 0 1-2.522 2.523h-6.313z"/></svg>
          Sign in with Slack
        </a>
      </div>
    </div>

    <div id="main-screen" class="hidden">
      <nav class="sidebar">
        <div class="sidebar-header">
          <span class="logo">⛺ camper</span>
        </div>
        <ul class="nav-links">
          <li><a href="#" data-page="overview" class="active">📊 Overview</a></li>
          <li><a href="#" data-page="tickets">🎫 Tickets</a></li>
          <li><a href="#" data-page="leaderboard">🏆 Leaderboard</a></li>
        </ul>
        <div class="sidebar-footer">
          <img id="user-avatar" src="" alt="" />
          <span id="user-name"></span>
          <a href="/auth/logout" class="logout-link">Sign out</a>
        </div>
      </nav>

      <main class="content">
        <!-- Overview -->
        <section id="page-overview" class="page">
          <h2>Overview</h2>
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-value" id="stat-total">—</div>
              <div class="stat-label">Total tickets</div>
            </div>
            <div class="stat-card open">
              <div class="stat-value" id="stat-open">—</div>
              <div class="stat-label">Open</div>
            </div>
            <div class="stat-card resolved">
              <div class="stat-value" id="stat-resolved">—</div>
              <div class="stat-label">Resolved</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="stat-oldest">—</div>
              <div class="stat-label">Oldest open</div>
            </div>
          </div>
          <h3>Activity (last 30 days)</h3>
          <div class="chart-container">
            <canvas id="activity-chart"></canvas>
          </div>
        </section>

        <!-- Tickets -->
        <section id="page-tickets" class="page hidden">
          <div class="tickets-header">
            <h2>Tickets</h2>
            <div class="tickets-controls">
              <input type="text" id="search-input" placeholder="Search..." />
              <select id="status-filter">
                <option value="all">All</option>
                <option value="open">Open</option>
                <option value="closed">Resolved</option>
              </select>
            </div>
          </div>
          <div id="tickets-list"></div>
          <div class="pagination">
            <button id="prev-page" disabled>← Previous</button>
            <span id="page-info"></span>
            <button id="next-page">Next →</button>
          </div>
        </section>

        <!-- Leaderboard -->
        <section id="page-leaderboard" class="page hidden">
          <h2>Helper leaderboard</h2>
          <div class="period-tabs">
            <button class="tab active" data-period="all">All time</button>
            <button class="tab" data-period="week">This week</button>
            <button class="tab" data-period="today">Today</button>
          </div>
          <div id="leaderboard-list"></div>
        </section>
      </main>
    </div>

    <!-- Ticket detail modal -->
    <div id="ticket-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>Ticket detail</h3>
          <button class="modal-close">&times;</button>
        </div>
        <div id="modal-body"></div>
        <div id="modal-actions" class="modal-actions"></div>
        <div id="reply-area" class="reply-area hidden">
          <textarea id="reply-text" placeholder="Reply in thread..."></textarea>
          <button id="send-reply" class="btn btn-primary">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
